<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Encompass Field Search v11</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#F4F7FA;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#001D60;padding:9px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:4px solid #00B2E2}
.hic{background:#00B2E2;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px}
.htx{color:#fff;font-size:15px;font-weight:bold}
.hsx{color:#7FCCEE;font-size:10px;margin-top:1px}
.hct{margin-left:auto;background:rgba(0,178,226,0.18);border:1px solid #00B2E2;color:#00B2E2;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:bold}
.tlb{background:#fff;padding:9px 14px;border-bottom:1px solid #D5E8F0;display:flex;gap:7px;align-items:center;flex-shrink:0}
.sw{position:relative;flex:1;min-width:0}
.sw input{width:100%;padding:8px 12px 8px 30px;border:2px solid #00B2E2;border-radius:5px;font-size:13px;outline:none}
.sw input:focus{border-color:#001D60;box-shadow:0 0 0 3px rgba(0,178,226,0.18)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#73C92D;pointer-events:none}
.btn{padding:8px 14px;border-radius:5px;border:none;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.bs{background:#001D60;color:#fff}
.bc{background:#E8EEF5;color:#444;border:1px solid #C5D0DC}
.be{background:#73C92D;color:#fff}
.sts{background:#E8F7FC;padding:5px 14px;border-bottom:1px solid #D5E8F0;font-size:11px;color:#336680;flex-shrink:0}
.tw{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{background:#001D60;color:#C8E6F5;padding:9px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;z-index:1}
th:nth-child(1){width:175px}
th:nth-child(2){width:auto}
th:nth-child(3){width:80px}
th:nth-child(4){width:95px}
tbody tr{border-bottom:1px solid #E2EEF5;cursor:pointer}
tbody tr:nth-child(even){background:#F0FAFF}
tbody tr:hover{background:#C8E9F5!important}
tbody tr.copied{background:#D6F0D6!important}
td{padding:7px 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a2a3a}
.fi{font-family:monospace;font-weight:bold;color:#001D60;font-size:12px}
.em{text-align:center;padding:60px 20px;color:#7FAFC0;font-size:14px;line-height:2.2}
.tst{position:fixed;bottom:18px;right:18px;background:#001D60;color:#fff;padding:9px 16px;border-radius:6px;font-size:12px;font-weight:bold;border-left:4px solid #73C92D;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;z-index:9999}
.tst.show{opacity:1;transform:translateY(0)}
mark{background:#FFF176;color:#001D60;font-weight:bold;border-radius:2px;padding:0 1px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:bold;color:#fff;letter-spacing:0.3px}
.badge-v{background:#7C3AED}
.badge-s{background:#0369A1}
.badge-c{background:#B45309}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:#336680;font-size:13px}
.spinner{width:36px;height:36px;border:3px solid #D5E8F0;border-top-color:#00B2E2;border-radius:50%;animation:spin 0.8s linear infinite}
.progress-bar-wrap{width:280px;height:8px;background:#D5E8F0;border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:#00B2E2;border-radius:4px;transition:width 0.3s}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#FFF0F0;border:1px solid #FFAAAA;color:#AA0000;padding:14px 18px;border-radius:6px;font-size:12px;margin:16px;line-height:1.8}
.err-box b{display:block;margin-bottom:4px;font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hic">&#128269;</div>
  <div>
    <div class="htx">Encompass Field Search</div>
    <div class="hsx">ICE Mortgage Technology &middot; Field Reference</div>
  </div>
  <div class="hct" id="fieldCountBadge">Ready</div>
</div>

<div class="tlb">
  <div class="sw">
    <span class="si">&#9906;</span>
    <input id="searchBox" type="text" placeholder="Type Field ID or Description and press Search or Enter..." autocomplete="off"/>
  </div>
  <button class="btn bs" id="searchBtn">Search</button>
  <button class="btn bc" id="clearBtn">Clear</button>
  <button class="btn be" id="exportBtn" disabled>&#11015; Export CSV</button>
</div>

<div class="sts" id="statusBar">Ready &mdash; Type a keyword and press Search or Enter to begin.</div>

<div class="tw" id="resultsDiv">
  <div class="em">
    &#128269;&nbsp; Type a keyword above and press <strong>Search</strong> or <strong>Enter</strong>.<br>
    <span style="font-size:12px;color:#aaa">Standard, Virtual, and Custom fields are fetched automatically.</span>
  </div>
</div>

<div class="tst" id="toastDiv">&#128203; <span id="toastMsg"></span></div>

<script>
var allFields   = [];
var fieldsReady = false;
var loadPromise = null;   // ensures we only load once at a time

// ── Entry point: called by Search button / Enter key ───────────
function handleSearch() {
  var q = document.getElementById('searchBox').value.trim();
  if (!q) return;

  if (fieldsReady) {
    runSearch(q);
  } else {
    loadFieldsThenSearch(q);
  }
}

// ── Load fields, then run the search ──────────────────────────
async function loadFieldsThenSearch(q) {
  if (loadPromise) {
    // Already loading — wait for it then search
    await loadPromise;
    runSearch(q);
    return;
  }

  var searchBtn = document.getElementById('searchBtn');
  searchBtn.disabled = true;
  searchBtn.textContent = '⏳ Loading...';
  document.getElementById('fieldCountBadge').textContent = 'Loading...';

  document.getElementById('resultsDiv').innerHTML =
    '<div class="loading-wrap">' +
      '<div class="spinner"></div>' +
      '<div id="loadMsg">Connecting to Encompass API...</div>' +
      '<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>' +
    '</div>';

  loadPromise = doLoad();

  try {
    await loadPromise;
  } catch(e) {
    // error already rendered inside doLoad
  } finally {
    loadPromise = null;
    searchBtn.disabled = false;
    searchBtn.textContent = 'Search';
  }

  if (fieldsReady) runSearch(q);
}

async function doLoad() {
  allFields   = [];
  fieldsReady = false;
  var errors  = [];

  try {
    setStatus('Authenticating...');
    var authObject  = await elli.script.getObject("auth");
    var token       = await authObject.getAccessToken();
    var accessToken = token.access_token;
    var http        = await elli.script.getObject('http');
    var baseUrl     = 'https://concept.api.ellimae.com/';

    // ── Standard Fields ──────────────────────────────────────
    setLoadMsg('Fetching Standard fields...', 10);
    try {
      var stdData = parseResponse(await http.get(baseUrl + 'encompass/v3/schemas/loan/standardFields', accessToken));
      stdData.forEach(function(f) {
        var id = f.id || f.fieldId || f.name || '';
        if (id) allFields.push({ id: id, desc: f.description || f.displayName || f.label || '', type: 'Standard', format: f.format || '', readOnly: f.readOnly !== undefined ? String(f.readOnly) : '' });
      });
    } catch(e) { errors.push('Standard: ' + errMsg(e)); }

    // ── Virtual Fields ───────────────────────────────────────
    setLoadMsg('Fetching Virtual fields...', 45);
    try {
      var virtData = parseResponse(await http.get(baseUrl + 'encompass/v3/schema/loan/virtualfields', accessToken));
      virtData.forEach(function(f) {
        var id = f.id || f.fieldId || f.name || '';
        if (id) allFields.push({ id: id, desc: f.description || f.displayName || f.label || '', type: 'Virtual', format: f.format || '', readOnly: f.readOnly !== undefined ? String(f.readOnly) : '' });
      });
    } catch(e) { errors.push('Virtual: ' + errMsg(e)); }

    // ── Custom Fields ────────────────────────────────────────
    setLoadMsg('Fetching Custom fields...', 75);
    try {
      var custData = parseResponse(await http.get(baseUrl + 'encompass/v1/settings/loan/customFields', accessToken));
      custData.forEach(function(f) {
        var id = f.id || f.fieldId || f.name || '';
        if (id) allFields.push({ id: id, desc: f.description || f.displayName || f.label || '', type: 'Custom', format: f.format || f.type || '', readOnly: f.readOnly !== undefined ? String(f.readOnly) : '' });
      });
    } catch(e) { errors.push('Custom: ' + errMsg(e)); }

    setLoadMsg('Done!', 100);

    allFields.sort(function(a,b){ return a.id.toLowerCase().localeCompare(b.id.toLowerCase()); });

    fieldsReady = true;
    document.getElementById('exportBtn').disabled = false;
    document.getElementById('fieldCountBadge').textContent = allFields.length.toLocaleString() + ' Fields';

    var summary = allFields.length.toLocaleString() + ' fields loaded.';
    if (errors.length) summary += ' \u26a0\ufe0f Errors: ' + errors.join(' | ');
    setStatus(summary);

  } catch(err) {
    document.getElementById('resultsDiv').innerHTML =
      '<div class="err-box">' +
        '<b>&#10060; Failed to load fields from the Encompass API</b>' +
        escHtml(errMsg(err)) + '<br><br>' +
        '<small>Make sure this tool is running inside Encompass with the required API permissions.</small>' +
      '</div>';
    document.getElementById('fieldCountBadge').textContent = 'Error';
    setStatus('Failed to load fields. Check the error below and try again.');
    throw err;
  }
}

// ── Run search against loaded fields ──────────────────────────
function runSearch(q) {
  q = (q !== undefined ? q : document.getElementById('searchBox').value.trim()).toLowerCase();
  var results = document.getElementById('resultsDiv');

  if (!q) {
    results.innerHTML = '<div class="em">&#128269;&nbsp; Type a keyword above to search ' + allFields.length.toLocaleString() + ' fields</div>';
    setStatus('Ready \u2014 ' + allFields.length.toLocaleString() + ' fields loaded. Type a keyword and press Search or Enter.');
    return;
  }

  var hits = allFields.filter(function(f) {
    return f.id.toLowerCase().indexOf(q) !== -1 || f.desc.toLowerCase().indexOf(q) !== -1;
  });

  if (hits.length === 0) {
    results.innerHTML = '<div class="em">&#10060;&nbsp; No fields found for &ldquo;' + escHtml(q) + '&rdquo;</div>';
    setStatus('No fields found for "' + q + '".');
    return;
  }

  var MAX  = 1000;
  var show = hits.slice(0, MAX);
  var re   = buildRegex(q);

  var html = '<table><thead><tr><th>Field ID</th><th>Description</th><th>Type</th><th>Format</th></tr></thead><tbody>';
  for (var i = 0; i < show.length; i++) {
    var f = show[i];
    var sid  = escHtml(f.id);
    var sdsc = escHtml(f.desc);
    var sfmt = escHtml(f.format);
    var bcls = f.type === 'Virtual' ? 'badge-v' : f.type === 'Standard' ? 'badge-s' : 'badge-c';
    html +=
      '<tr data-fid="' + sid + '">' +
        '<td class="fi">' + highlight(sid, re) + '</td>' +
        '<td>' + highlight(sdsc, re) + '</td>' +
        '<td><span class="badge ' + bcls + '">' + f.type + '</span></td>' +
        '<td style="color:#888;font-size:11px">' + sfmt + '</td>' +
      '</tr>';
  }
  html += '</tbody></table>';
  results.innerHTML = html;

  setStatus(
    hits.length > MAX
      ? 'Showing first ' + MAX.toLocaleString() + ' of ' + hits.length.toLocaleString() + ' matches. Refine your search. Click any row to copy Field ID.'
      : 'Found ' + hits.length.toLocaleString() + ' match' + (hits.length !== 1 ? 'es' : '') + '. Click any row to copy Field ID.'
  );
}

// ── Row click → copy Field ID ──────────────────────────────────
document.getElementById('resultsDiv').addEventListener('click', function(e) {
  var row = e.target.closest('tr[data-fid]');
  if (row) {
    var fid = row.getAttribute('data-fid');
    copyToClipboard(fid);
    row.classList.add('copied');
    setTimeout(function(){ row.classList.remove('copied'); }, 1200);
  }
});

// ── Button wiring ──────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', handleSearch);

document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('searchBox').value = '';
  if (fieldsReady) runSearch('');
  else {
    document.getElementById('resultsDiv').innerHTML =
      '<div class="em">&#128269;&nbsp; Type a keyword above and press <strong>Search</strong> or <strong>Enter</strong>.<br><span style="font-size:12px;color:#aaa">Standard, Virtual, and Custom fields are fetched automatically.</span></div>';
    setStatus('Ready \u2014 Type a keyword and press Search or Enter to begin.');
  }
  document.getElementById('searchBox').focus();
});

document.getElementById('exportBtn').addEventListener('click', function() {
  var q    = document.getElementById('searchBox').value.trim().toLowerCase();
  var rows = q ? allFields.filter(function(f) {
    return f.id.toLowerCase().indexOf(q) !== -1 || f.desc.toLowerCase().indexOf(q) !== -1;
  }) : allFields;

  var csv = ['"Field ID","Description","Type","Format","ReadOnly"'];
  rows.forEach(function(f) {
    csv.push(
      '"' + (f.id      ||'').replace(/"/g,'""') + '",' +
      '"' + (f.desc    ||'').replace(/"/g,'""') + '",' +
      '"' + (f.type    ||'').replace(/"/g,'""') + '",' +
      '"' + (f.format  ||'').replace(/"/g,'""') + '",' +
      '"' + (f.readOnly||'').replace(/"/g,'""') + '"'
    );
  });

  var blob = new Blob([csv.join('\n')], {type:'text/csv;charset=utf-8;'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'EncompassFields.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
});

// ── Enter key triggers search ──────────────────────────────────
document.getElementById('searchBox').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSearch();
});

// ── Helpers ────────────────────────────────────────────────────
function parseResponse(res) {
  if (typeof res === 'string') { try { res = JSON.parse(res); } catch(e) { return []; } }
  if (res && res.content) res = res.content;
  return Array.isArray(res) ? res : [];
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

function setLoadMsg(msg, pct) {
  var lbl = document.getElementById('loadMsg');
  if (lbl) lbl.textContent = msg;
  var bar = document.getElementById('progressBar');
  if (bar) bar.style.width = pct + '%';
}

function errMsg(e) { return e && e.message ? e.message : String(e); }

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildRegex(q) {
  return new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
}

function highlight(s, re) { return s.replace(re, '<mark>$1</mark>'); }

function showToast(msg) {
  var t = document.getElementById('toastDiv');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){ showToast('"' + text + '" copied to clipboard!'); }).catch(function(){ fallbackCopy(text); });
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  var el = document.createElement('textarea');
  el.value = text; el.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(el); el.focus(); el.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(el);
  showToast('"' + text + '" copied!');
}
</script>
</body>
</html>
